name: JobScout ingest (scheduled)

on:
  schedule:
    # Every 4 hours (6 runs/day). Times are UTC.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install supabase python-dotenv httpx selectolax pyyaml

      - name: Run ingest to Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ./jobScout/scripts/ingest_to_supabase.py
