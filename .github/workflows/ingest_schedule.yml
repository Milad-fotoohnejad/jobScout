name: JobScout ingest (scheduled)

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: ./jobScout
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install supabase python-dotenv httpx selectolax pyyaml

      - name: Run ingest to Supabase
        working-directory: ./jobScout
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python ./scripts/ingest_to_supabase.py